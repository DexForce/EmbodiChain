  test:
    if: github.event_name == 'pull_request'
    needs: lint
    runs-on: Linux
    env:
      NVIDIA_DRIVER_CAPABILITIES: all
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DISABLE_REQUIRE: 1
    container: *container_template
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          pip install -e .[lerobot] --extra-index-url http://pyp.open3dv.site:2345/simple/ --trusted-host pyp.open3dv.site
          echo "Unit test Start"
          export HF_ENDPOINT=https://hf-mirror.com
          pip uninstall pymeshlab -y
          pip install pymeshlab==2023.12.post3
          pip install numpy==1.26.4
          pytest tests

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: Linux
    permissions:
      pages: write
      id-token: write
    env:
      NVIDIA_DRIVER_CAPABILITIES: all
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DISABLE_REQUIRE: 1
    container: *container_template
    steps:
      - uses: actions/checkout@v4

      - name: Download docs artifact (main push - Phase 1)
        uses: actions/download-artifact@v4
        with:
          name: github-pages

