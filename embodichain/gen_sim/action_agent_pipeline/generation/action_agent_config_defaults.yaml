task:
  default_name: UR5BreadBasket
  max_episodes: 1
  max_episode_steps: 1000

geometry:
  target_body_scale: 1.3
  surface_release_clearance: 0.075
  tabletop_object_clearance: 0.003
  dual_ur5:
    legacy_init_z: 0.5
    arm_component_z: 0.4
    tabletop_clearance: 0.05
  dual_franka:
    tabletop_clearance: 0.05

relative_placement:
  side_relation_distance: 0.16
  side_release_z_offset: 0.12
  on_release_z_offset: 0.2
  container_slot_min_offset: 0.04
  container_slot_max_offset: 0.12
  container_slot_fraction: 0.25
  container_slot_max_fraction: 0.40
  container_slot_axis_tie_ratio: 0.10
  staging_z_delta: 0.10
  pose_sensitive_staging_z_delta: 0.25
  pickup_upright_rotate_degrees: 45.0

arrangement:
  release_z: 0.04
  staging_z_delta: 0.10
  pose_sensitive_staging_z_delta: 0.15
  slot_margin: 0.025
  min_slot_spacing: 0.07
  layout_clearance: 0.025
  row_search_step: 0.025
  row_search_radius: 0.25
  movable_initial_overlap_score_weight: 0.01

stacking:
  staging_z_delta: 0.05
  clearance: 0.05
  anchor_offset: 0.1
  anchor_clearance_radius: 0.1

action:
  basket_left_release_offset_y: 0.04
  basket_right_release_offset_y: -0.04
  pickup_lift_height: 0.30
  runtime_default_pickup_lift_height: 0.16
  place_lift_height: 0.20
  direct_place_cartesian_waypoint_count: 4
  release_only_place_sample_interval: 10
  empty_hand_retreat_sample_interval: 30

physics:
  background:
    mass: 10.0
    static_friction: 0.95
    dynamic_friction: 0.9
    restitution: 0.01
    max_convex_hull_num: 1
  rigid_object:
    mass: 0.01
    contact_offset: 0.00
    rest_offset: 0.00
    restitution: 0.01
    max_depenetration_velocity: 10.0
    min_position_iters: 32
    min_velocity_iters: 8
  convex_hulls:
    target: 32
    container: 32
    moved: 32
    extra_rigid: 1

grasp:
  antipodal_n_sample: 10000
  antipodal_max_angle_degrees: 15.0
  max_open_length: 0.14
  min_open_length: 0.003
  finger_length: 0.13
  point_sample_dense: 0.012
  max_deviation_angle_degrees: 15.0
  viser_port: 11801
  coordinated_rod_like_inset_fractions: [0.18, 0.22, 0.26, 0.30]
  coordinated_container_like_inset_fractions: [0.08, 0.12, 0.20, 0.28]
  coordinated_generic_inset_fractions: [0.28, 0.35, 0.20]
