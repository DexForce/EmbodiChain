    "reason": "Move the existing mug to a random valid tabletop position."
  }

intent_user: |
  User edit prompt:
  ${prompt}

  Existing scene objects:
  ${scene_objects_json}

  Produce the scene edit intent. Remember:
  - deleted_object_ids includes both explicitly deleted objects and replaced old objects.
  - generated_objects includes every new object needed by add or replace operations, and excludes move operations.
  - generated_objects[].temp_id and add/replace operations[].new_object_temp_id must use interact_<canonical_snake_case_name>_<index>, not new_.
  - operations must contain enough placement information for the program to update relations and 9-grid assignments.
  - Delete operations must use placement.type=preserve_target with empty reference_object_id, relation, and grid.
  - Existing-object movement must use type=move, target_object_id, empty new_object_temp_id, and random placement when no destination is specified.
  - The required keys must all be present, including top-level reason, generated_objects[].source_operation, operations[].reason, operations[].confidence, and unresolved[].query/reason/candidate_object_ids when unresolved is non-empty.
