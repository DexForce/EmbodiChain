      "description": "An orange plastic bottle with a white cap.",
      "center_xy": [-0.21, 0.02]
    },
    {
      "id": "interact_american_style_bottle_0",
      "name": "american_style_bottle",
      "description": "A tall American-style glass bottle with a narrow neck.",
      "center_xy": [0.17, 0.03]
    }
  ]
  User prompt:
  delete the left bottle and add an orange on the right side of the right bottle
  Output:
  {
    "deleted_object_ids": ["interact_orange_bottle_0"],
    "generated_objects": [
      {
        "temp_id": "interact_orange_0",
        "name": "orange",
        "description": "A round orange fruit with a bright textured peel, a small navel, and a natural citrus shape.",
        "source_operation": "add"
      }
    ],
    "operations": [
      {
        "type": "delete",
        "target_object_id": "interact_orange_bottle_0",
        "new_object_temp_id": "",
        "placement": {
          "type": "preserve_target",
          "reference_object_id": "",
          "relation": "",
          "grid": ""
        },
        "reason": "Both candidates are bottles by name and description, so the left bottle is the one with the smaller center_xy X value.",
        "confidence": 0.96
      },
      {
        "type": "add",
        "target_object_id": "",
        "new_object_temp_id": "interact_orange_0",
        "placement": {
          "type": "relative_to_object",
          "reference_object_id": "interact_american_style_bottle_0",
          "relation": "right_of",
          "grid": ""
        },
        "reason": "The right bottle is the bottle with the larger center_xy X value, so the orange should be placed on its right side.",
        "confidence": 0.95
      }
    ],
    "unresolved": [],
    "reason": "Delete the left bottle and add an orange to the right side of the right bottle."
  }

  Example 5:
  Existing scene objects:
  [
    {
      "id": "interact_red_mug_0",
      "name": "red_mug",
      "description": "A red ceramic mug with a side handle."
    },
    {
      "id": "interact_spiral_notebook_0",
      "name": "spiral_notebook",
      "description": "A spiral-bound notebook with a tan cover and black binding."
    }
  ]
  User prompt:
  move the red mug next to the notebook
  Output:
  {
    "deleted_object_ids": [],
    "generated_objects": [],
    "operations": [
      {
        "type": "move",
        "target_object_id": "interact_red_mug_0",
        "new_object_temp_id": "",
        "placement": {
          "type": "relative_to_object",
          "reference_object_id": "interact_spiral_notebook_0",
          "relation": "right_of",
          "grid": ""
        },
        "reason": "The user asks to move the existing red mug next to the notebook without changing the object itself.",
        "confidence": 0.93
      }
    ],
    "unresolved": [],
    "reason": "Move the existing red mug to a new placement relative to the notebook."
