<nav class="bd-links bd-docs-nav">
  <div class="bd-toc-item navbar-nav">
    <ul class="nav bd-sidenav">
      <li class="toctree-l1 has-children" style="display:flex;justify-content:center;align-items:center;flex-direction:column;">
        <div style="text-align:center;">
          <label for="version-select" style="font-weight:bold;display:block;">Version</label>
        </div>
        <select id="version-select" class="version-dropdown" style="margin:0 auto;display:block;">
          <option>Loading...</option>
        </select>
      </li>
    </ul>
  </div>
</nav>
<script>
(function() {
  var sel = document.getElementById("version-select");
  var path = window.location.pathname;

  // Derive the docs root by stripping the version segment from the current path.
  // CI layout: /<prefix>/v0.1.3/api.html -> /<prefix>
  // Local layout (no version segment): keep path as-is and try root
  var match = path.match(/^(.*\/)(main|v[\d.]+)\//);
  var base = match ? match[1].replace(/\/$/, "") : "";

  fetch(base + "/versions.json")
    .then(function(r) {
      if (!r.ok) throw new Error(r.status);
      return r.json();
    })
    .then(function(data) {
      if (!data.versions || data.versions.length === 0) throw new Error("no versions");
      sel.innerHTML = "";
      data.versions.forEach(function(v) {
        var opt = document.createElement("option");
        opt.value = base + "/" + v.name + "/index.html";
        opt.textContent = v.name + (v.name === data.latest ? " (latest)" : "");
        if (path.indexOf("/" + v.name + "/") !== -1) {
          opt.selected = true;
        }
        sel.appendChild(opt);
      });
    })
    .catch(function() {
      // Local build or versions.json unavailable — show current version label
      var label = match ? match[2] : "local";
      sel.innerHTML = "";
      var opt = document.createElement("option");
      opt.textContent = label;
      opt.selected = true;
      opt.disabled = true;
      sel.appendChild(opt);
    });
  sel.onchange = function() { if (this.value) window.location.href = this.value; };
})();
</script>
