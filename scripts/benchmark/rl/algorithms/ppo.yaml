name: ppo
config:
  policy:
    name: actor_critic
    actor:
      type: mlp
      network_cfg:
        hidden_sizes: [256, 256]
        activation: relu
    critic:
      type: mlp
      network_cfg:
        hidden_sizes: [256, 256]
        activation: relu
  algorithm:
    name: ppo
    cfg:
      learning_rate: 0.0001
      n_epochs: 10
      batch_size: 8192
      gamma: 0.99
      gae_lambda: 0.95
      clip_coef: 0.2
      ent_coef: 0.01
      vf_coef: 0.5
      max_grad_norm: 0.5
